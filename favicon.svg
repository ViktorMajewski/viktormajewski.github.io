<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    circle, line { stroke: #222; }
    @media (prefers-color-scheme: dark) {
      circle, line { stroke: #e8e8e8; }
    }
  </style>

  <!-- Central node -->
  <circle cx="16" cy="18" r="3" fill="none" stroke-width="2"/>

  <!-- Top node -->
  <circle cx="16" cy="4"  r="3" fill="none" stroke-width="2"/>
  <!-- Bottom-left node -->
  <circle cx="4"  cy="28" r="3" fill="none" stroke-width="2"/>
  <!-- Bottom-right node -->
  <circle cx="28" cy="28" r="3" fill="none" stroke-width="2"/>

  <!-- Edges -->
  <line x1="16" y1="7"   x2="16" y2="15"  stroke-width="2"/>
  <line x1="14" y1="20"  x2="6"  y2="26"  stroke-width="2"/>
  <line x1="18" y1="20"  x2="26" y2="26"  stroke-width="2"/>
</svg>
